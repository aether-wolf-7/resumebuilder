<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Builder Logger</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      width: 320px;
    }

    .header {
      background: #1A7A7A;
      color: #fff;
      padding: 10px 14px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 11px;
      color: #DDEFEF;
      margin-top: 2px;
    }

    .form {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: #1A7A7A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 3px;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #B8D4D4;
      border-radius: 3px;
      font-size: 12px;
      font-family: inherit;
      color: #1A1A1A;
      background: #fff;
      outline: none;
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: #1A7A7A;
    }

    textarea {
      resize: vertical;
      min-height: 44px;
    }

    .btn {
      width: 100%;
      padding: 8px;
      background: #1A7A7A;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .btn:hover { background: #155f5f; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    .status {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 3px;
      text-align: center;
      display: none;
    }

    .status.ok  { background: #e6f4f1; color: #155f5f; border: 1px solid #9ecece; }
    .status.err { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6c6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>CV Builder Logger</h1>
    <p>Log this job application to Google Sheets</p>
  </div>

  <div class="form">
    <div>
      <label for="company">Company</label>
      <input type="text" id="company" placeholder="e.g. Orium" />
    </div>

    <div>
      <label for="position">Position</label>
      <input type="text" id="position" placeholder="e.g. Software Developer" />
    </div>

    <div>
      <label for="url">Job URL</label>
      <input type="text" id="url" placeholder="Current page URL" />
    </div>

    <div>
      <label for="status">Status</label>
      <select id="status">
        <option value="Applied">Applied</option>
        <option value="Interviewing">Interviewing</option>
        <option value="Offer">Offer</option>
        <option value="Rejected">Rejected</option>
        <option value="Withdrawn">Withdrawn</option>
      </select>
    </div>

    <div>
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" placeholder="Referral, salary range, etc."></textarea>
    </div>

    <div id="status-msg" class="status"></div>

    <button class="btn" id="log-btn">Log Application</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
