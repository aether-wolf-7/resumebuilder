<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CV Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1A7A7A;
      color: #fff;
      padding: 11px 15px;
      flex-shrink: 0;
    }

    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .header p  { font-size: 11px; color: #DDEFEF; margin-top: 2px; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 13px 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .field { display: flex; flex-direction: column; gap: 3px; }

    label {
      font-size: 10px;
      font-weight: 700;
      color: #1A7A7A;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"], textarea {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #B8D4D4;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      color: #1A1A1A;
      background: #fff;
      outline: none;
    }

    input:focus, textarea:focus { border-color: #1A7A7A; }
    textarea { resize: vertical; }

    .btn {
      width: 100%;
      padding: 9px;
      background: #1A7A7A;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn:hover    { background: #155f5f; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    hr { border: none; border-top: 1px solid #dde; }

    .status {
      font-size: 12px;
      padding: 6px 9px;
      border-radius: 4px;
      display: none;
    }
    .status.ok  { background: #e6f4f1; color: #155f5f; border: 1px solid #9ecece; display: block; }
    .status.err { background: #fdecea; color: #b71c1c; border: 1px solid #f5c6c6; display: block; }
    .status.inf { background: #fff8e1; color: #7a5c00; border: 1px solid #f0d070; display: block; }

    .result-card {
      background: #fff;
      border: 1px solid #B8D4D4;
      border-radius: 5px;
      padding: 10px 12px;
      display: none;
      flex-direction: column;
      gap: 7px;
      font-size: 12px;
    }

    .result-card.visible { display: flex; }

    .result-meta { line-height: 1.7; }
    .result-meta strong { color: #1A7A7A; }

    .result-files {
      background: #f0f8f8;
      border: 1px solid #c8e6e6;
      border-radius: 3px;
      padding: 7px 9px;
      line-height: 1.8;
      font-size: 11px;
      color: #333;
    }

    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    .tag-ok  { background: #e6f4f1; color: #155f5f; }
    .tag-err { background: #fdecea; color: #b71c1c; }
  </style>
</head>
<body>

  <div class="header">
    <h1>CV Builder</h1>
    <p id="server-badge">Checking server…</p>
  </div>

  <div class="content">

    <div class="field">
      <label>Job URL</label>
      <input type="text" id="job-url" placeholder="Paste the job posting URL here" />
    </div>

    <div class="field">
      <label>Job Description</label>
      <textarea id="jd" rows="12" placeholder="Paste the full job description here…"></textarea>
    </div>

    <div id="gen-status" class="status"></div>
    <button class="btn" id="gen-btn">Generate Resume + Cover Letter</button>

    <div id="result-card" class="result-card">
      <hr />
      <div class="result-meta" id="result-meta"></div>
      <div class="result-files" id="result-files"></div>
    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
